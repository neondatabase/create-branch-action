name: Dependabot Auto Package

on:
  pull_request:
    branches:
      - main
    paths:
      - '**/bun.lockb'
      - '**/bun.lock'
  workflow_dispatch:

permissions:
  # Needed for checkout and push
  contents: write
  # Needed for PR comments
  pull-requests: write

jobs:
  auto-package:
    name: Auto Package Dependabot PR
    runs-on: ubuntu-latest
    # Run on Dependabot PRs or manual triggers
    if:
      github.repository == github.event.pull_request.head.repo.full_name &&
      (github.event.pull_request.user.login == 'dependabot[bot]' ||
      github.event_name == 'workflow_dispatch')

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # Required to push changes
          token: ${{ secrets.GITHUB_TOKEN }}
          # Need to fetch complete PR
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Run Packaging
        run: bun run all

      - name: Check for changes
        id: check-changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push if changes exist
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "chore: update package after dependency updates"
          git push

      - name: Add comment to PR
        if: steps.check-changes.outputs.has_changes == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '👋 I just pushed packaging updates after the dependency changes. Please verify the changes!'
            })
